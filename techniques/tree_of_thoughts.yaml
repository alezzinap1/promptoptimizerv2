id: tree_of_thoughts
name: "Tree of Thoughts (ToT)"
aliases: ["дерево мыслей", "разветвлённое рассуждение", "multiple reasoning paths"]

when_to_use:
  task_types: [analysis, decision_making, research, complex_reasoning, planning]
  complexity: [high]
  not_for: [simple_facts, creative_freeform, time_sensitive_tasks, short_generation]

priority: 5

why_it_works: >
  **Дорого по токенам:** несколько ветвей рассуждения и отсев слабых — для задач, где первый
  путь часто ошибочен (планирование, неочевидный выбор). На простых задачах избыточно.

variants:
  - name: "BFS (поиск в ширину)"
    pattern: |
      Задача: {task}

      Сгенерируй 3 принципиально разных подхода к решению.
      Для каждого подхода:
      1. Опиши суть подхода (1-2 предложения)
      2. Оцени вероятность успеха (низкая/средняя/высокая) и обоснуй

      Выбери наиболее перспективный подход и разработай его детально.
    cost_tokens: high
    use_when: "задача с несколькими возможными решениями, нужно найти оптимальное"

  - name: "DFS с рефлексией"
    pattern: |
      Задача: {task}

      Шаг 1: Предложи первоначальное направление решения.
      Шаг 2: Критически проверь это направление: есть ли тупики, противоречия?
      Шаг 3: Если обнаружен тупик — отступи и выбери альтернативное направление.
      Шаг 4: Продолжай до нахождения полного корректного решения.
      Шаг 5: Дай финальный ответ.
    cost_tokens: medium
    use_when: "задача требует итеративного уточнения с возможностью отката"

  - name: "Оценочное дерево"
    pattern: |
      Задача: {task}

      Раунд 1 — Генерация:
      Предложи 3 разных варианта решения/ответа.

      Раунд 2 — Оценка:
      Для каждого варианта: сильные стороны, слабые стороны, оценка (1-10).

      Раунд 3 — Синтез:
      Объедини лучшие элементы вариантов в финальное решение.
    cost_tokens: high
    use_when: "нужно максимальное качество, задача допускает несколько хороших решений"

anti_patterns:
  - "Не используй для простых задач — overhead не оправдан"
  - "Не больше 3-4 ветвей на уровне — после этого качество не растёт"
  - "Не применяй когда есть единственно верный ответ (математика, факты)"

compatibility:
  combines_well_with: [role_prompting, chain_of_thought, self_consistency]
  is_expensive_version_of: [chain_of_thought]
  model_notes:
    gpt4o: "Наиболее эффективен на GPT-4 классе"
    small_model: "Не рекомендуется — слишком сложно для малых моделей"

examples:
  good:
    - input: "Как нам спроектировать систему уведомлений для 10M пользователей?"
      output: >
        Ты — senior software architect с опытом высоконагруженных систем.

        Задача: спроектировать систему уведомлений для 10M пользователей.

        Раунд 1 — три архитектурных подхода:
        1. Push-based через очередь сообщений (Kafka/RabbitMQ)
        2. Pull-based с WebSocket коннектами
        3. Гибридный: критичные уведомления через push, остальные через pull

        Для каждого подхода оцени: latency, throughput, сложность масштабирования, стоимость.

        Выбери наиболее перспективный и детально опиши архитектуру компонентов.

quality_signals:
  - "явно выражены несколько параллельных рассуждений или подходов"
  - "есть механизм оценки/сравнения вариантов"
  - "финальный ответ синтезирует результаты ветвей"
