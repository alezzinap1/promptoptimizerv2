id: least_to_most
name: "Least-to-Most Prompting"
aliases: ["декомпозиция", "от простого к сложному", "subproblem decomposition"]

when_to_use:
  task_types: [code, analysis, instruction, planning, research, debugging]
  complexity: [medium, high]
  not_for: [simple_facts, creative_freeform, short_generation]

priority: 3

why_it_works: >
  **Часто помогает** на задачах с цепочкой зависимостей: подзадачи от простой к сложной,
  каждая опирается на предыдущую — меньше «прыжков» к ответу и шаблонных ошибок.

core_pattern: |
  Разбей задачу на подзадачи от простейшей к самой сложной.
  Реши каждую последовательно, используя результаты предыдущих.
  Финальный ответ — синтез всех решённых подзадач.

variants:
  - name: "Явная декомпозиция"
    pattern: |
      Задача: {task}

      Шаг 1 — Декомпозиция:
      Перечисли подзадачи, которые нужно решить, в порядке от простой к сложной.

      Шаг 2 — Решение подзадач:
      Реши каждую подзадачу по очереди, ссылаясь на результаты предыдущих.

      Шаг 3 — Интеграция:
      Объедини решения подзадач в финальный ответ.
    cost_tokens: medium
    use_when: "сложная задача с явными зависимостями между частями"

  - name: "Предпосылки + решение"
    pattern: |
      Задача: {task}

      Перед решением ответь на вспомогательные вопросы:
      1. {prerequisite_1}
      2. {prerequisite_2}
      3. {prerequisite_3}

      Теперь используй эти ответы для решения основной задачи.
    cost_tokens: low
    use_when: "задача требует предварительного сбора/уточнения информации"

  - name: "Строительные блоки"
    pattern: |
      Задача: {final_task}

      Эта задача состоит из блоков — реши их в порядке зависимости:

      Блок A (фундамент): {block_a}
      [Решение A]

      Блок B (использует A): {block_b}
      [Решение B, опираясь на A]

      Блок C (использует A и B): {block_c}
      [Финальное решение]
    cost_tokens: medium
    use_when: "задача с явной иерархией зависимостей (типично для программирования)"

anti_patterns:
  - "Не создавай избыточно мелкие подзадачи — дробление ради дробления"
  - "Не используй для задач без зависимостей между частями"
  - "Убедись что порядок подзадач логически обоснован"

compatibility:
  combines_well_with: [chain_of_thought, role_prompting, structured_output]
  is_complementary_to: [tree_of_thoughts]

examples:
  good:
    - input: "Напиши функцию на Python для парсинга и валидации сложного JSON конфига"
      output: >
        Ты — senior Python developer.

        Разбей задачу на подзадачи:

        Подзадача 1 (простая): Определи структуру ожидаемого конфига и required поля.
        Подзадача 2 (средняя): Реализуй загрузку и базовый парсинг JSON.
        Подзадача 3 (сложнее): Добавь валидацию каждого поля с описательными ошибками.
        Подзадача 4 (интеграция): Объедини в финальную функцию с типизацией и docstring.

        Реши каждую последовательно, используя результаты предыдущей.

quality_signals:
  - "явная нумерованная декомпозиция на подзадачи"
  - "подзадачи упорядочены по зависимости (простая → сложная)"
  - "каждая подзадача ссылается на результаты предыдущих"
