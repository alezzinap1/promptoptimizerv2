id: negative_prompting
name: "Negative Prompting"
aliases: ["негативные инструкции", "guardrails", "anti-patterns", "запреты", "ограничения поведения"]

when_to_use:
  task_types: [code, analysis, writing, creative, structured_output, instruction]
  complexity: [low, medium, high]
  not_for: [simple_facts, one_word_answers]

priority: 2

why_it_works: >
  **Часто помогает** сузить поведение: явные «не делай X» дополняют позитивные инструкции
  и уменьшают лишние пояснения, оговорки и выдуманные детали, когда это не нужно задаче.

core_pattern: |
  {позитивная_инструкция}

  Критически важно — НЕ делай следующее:
  - {запрет_1}
  - {запрет_2}
  - {запрет_3}

variants:
  - name: "Output guardrails"
    pattern: |
      {task_and_role}

      Формат ответа — строго:
      {output_format}

      Запрещено:
      - Добавлять вступления и заключения ("Конечно!", "Надеюсь, помог!")
      - Включать объяснения или комментарии если не запрошены
      - Отклоняться от заданного формата
      - Использовать фразы "возможно", "вероятно", "я думаю"
    cost_tokens: low
    use_when: "нужен строго форматированный вывод без лишних элементов"

  - name: "Антигаллюцинационный блок"
    pattern: |
      {task}

      Правила достоверности (обязательно соблюдать):
      - Не придумывай факты, цифры, имена, даты которых нет в запросе
      - Если информации недостаточно — прямо скажи об этом
      - Не додумывай детали "для полноты картины"
      - Не используй фразы: "скорее всего", "по данным", "согласно исследованиям" без источника
    cost_tokens: low
    use_when: "задача требует фактической точности, риск галлюцинаций высок"

  - name: "Стилистические ограничения"
    pattern: |
      {task}

      Стиль и тон:
      {desired_style}

      Избегать:
      - Канцелярита и бюрократических формулировок
      - Пассивного залога там где уместен активный
      - Слов-паразитов: "в целом", "таким образом", "следует отметить"
      - Излишне длинных предложений (> 20 слов)
    cost_tokens: low
    use_when: "редактура текста, создание контента с требованиями к стилю"

  - name: "Scope ограничения"
    pattern: |
      Твоя задача: {specific_task}

      Строго в рамках задачи:
      - Отвечай только на то, что спрошено
      - Не расширяй скоп самостоятельно
      - Не добавляй "а также вам может быть интересно..."
      - Не предлагай альтернативы если не спрошено
    cost_tokens: low
    use_when: "нужен фокусированный ответ без отклонений от темы"

anti_patterns:
  - "Не превращай промпт в список из 20+ запретов — модель не удержит все"
  - "Не дублируй запреты разными словами — 1 запрет на концепцию"
  - "Запреты должны быть конкретными, не абстрактными ('не будь плохим')"
  - "Не используй двойные отрицания — 'не делай того что не нужно'"

compatibility:
  combines_well_with: [role_prompting, structured_output, constraints_prompting]
  is_complementary_to: [constraints_prompting]

examples:
  good:
    - input: "Нужен промпт для извлечения ключевых метрик из финансового отчёта в JSON"
      output: >
        Ты — финансовый аналитик-экстрактор данных.

        Задача: извлеки из текста финансового отчёта следующие метрики в JSON:
        revenue, net_profit, ebitda, cash_flow, debt_to_equity.

        Формат вывода — только валидный JSON:
        {"revenue": number_or_null, "net_profit": number_or_null, ...}

        Строго запрещено:
        - Добавлять объяснения, комментарии или markdown за пределами JSON
        - Придумывать значения если они не найдены — используй null
        - Округлять числа без явного указания в задаче
        - Добавлять дополнительные поля не из списка

# Вариант для text-to-image: «негатив» = что не рисовать / исключить из кадра (SD/MJ и т.д.)
image_variant:
  why_it_works: >
    Для генерации изображений явный список исключений снижает артефакты, лишние детали и
    типичные ошибки (лишние конечности, водяные знаки, шум) — в духе negative prompt в SD.
  core_pattern: |
    Основное описание сцены и стиля.

    Негатив / исключить (для движков с negative prompt — отдельной строкой или секцией):
    - {исключение_визуальное_1}
    - {исключение_визуальное_2}
    - {исключение_визуальное_3}

    Не смешивай запреты к LLM-чату с запретами к картинке: здесь только визуальные и композиционные.

quality_signals:
  - "запреты конкретны и напрямую связаны с вероятными нарушениями"
  - "не более 5-7 запретов (иначе модель теряет из виду)"
  - "запреты дополняют позитивные инструкции, не заменяют их"
