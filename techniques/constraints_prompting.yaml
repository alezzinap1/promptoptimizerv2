id: constraints_prompting
name: "Constraints Prompting"
aliases: ["ограничения", "запреты", "negative prompting", "guardrails", "boundaries"]

when_to_use:
  task_types: [writing, transformation, code, creative, analysis, summarization]
  complexity: [low, medium, high]
  not_for: []  # применим везде как дополнительный слой

priority: 2

why_it_works: >
  Явные ограничения ("НЕ делай X", "ТОЛЬКО формат Y", "максимум N слов") резко
  сужают пространство допустимых выводов. Без ограничений модель опирается на
  статистически "средний" ответ из обучающих данных. Ограничения направляют
  генерацию в нужное подпространство. Важно: негативные ограничения ("НЕ...") 
  работают лучше когда их максимум 3-5, иначе модель начинает их игнорировать.

variants:
  - name: "Hard constraints"
    pattern: |
      Строгие ограничения (не нарушать):
      - {constraint_1}
      - {constraint_2}
      - {constraint_3}
    cost_tokens: low
    use_when: "есть чёткие запреты или обязательные требования"

  - name: "Format constraints"
    pattern: |
      Формат: {format_spec}
      Длина: {length_limit}
      Стиль: {style_spec}
      Язык: {language}
    cost_tokens: low
    use_when: "нужно зафиксировать формат, объём и стиль"

  - name: "Content scope"
    pattern: |
      Включай ТОЛЬКО: {what_to_include}
      Исключай: {what_to_exclude}
    cost_tokens: low
    use_when: "нужно ограничить scope контента"

  - name: "Quality guardrails"
    pattern: |
      Требования к качеству:
      - Объективность: только факты, без предположений
      - Конкретность: конкретные данные, не общие фразы
      - Точность: не додумывай то, что не указано явно
    cost_tokens: low
    use_when: "нужна объективность и точность, минимизация галлюцинаций"

positive_vs_negative:
  positive: "ТОЛЬКО используй данные из документа" 
  negative: "НЕ добавляй информацию не из документа"
  note: "Оба варианта работают, позитивные чуть точнее; комбинируй оба для критичных задач"

optimal_constraints_count: "3-5 (больше начинают игнорироваться)"

anti_patterns:
  - "Не перечисляй >7 ограничений — приоритизируй важнейшие"
  - "Не формулируй противоречивые ограничения"
  - "Избегай расплывчатых ограничений ('будь хорошим') — только конкретные"
  - "Не ставь ограничения которые в принципе невыполнимы для задачи"

compatibility:
  combines_well_with: [role_prompting, structured_output, chain_of_thought, few_shot]
  typically_used_as: "дополнительный слой к любой другой технике"

examples:
  good:
    - input: "Резюме статьи"
      output: >
        Ты — профессиональный редактор.
        Напиши резюме статьи.

        Ограничения:
        - Длина: 3-5 предложений
        - Только информация из статьи, без домыслов
        - Без оценочных суждений, только факты
        - Стиль: деловой, без клише

    - input: "Напиши промпт для написания кода"
      output: >
        Ты — senior developer.
        Напиши функцию для {task}.

        Требования:
        - Язык: Python 3.11+
        - Без внешних зависимостей (только stdlib)
        - Обработка исключений обязательна
        - Документация: docstring с описанием параметров и return
        - Максимум 50 строк

quality_signals:
  - "ограничения специфичны и измеримы (не 'хороший', а 'до 200 слов')"
  - "3-5 ограничений (не больше)"
  - "нет противоречий между ограничениями"
  - "ограничения релевантны именно этой задаче"
