id: step_back
name: "Step-Back Prompting"
aliases: ["шаг назад", "абстракция", "первопринципы", "общий принцип"]

when_to_use:
  task_types: [analysis, research, decision_making, debugging, code]
  complexity: [medium, high]
  not_for: [simple_facts, creative_freeform, one_word_answers]

priority: 6

why_it_works: >
  Перед решением конкретной задачи заставляет модель сначала ответить на более абстрактный,
  общий вопрос ("шаг назад"). Это активирует релевантные первопринципы и общие знания,
  которые затем применяются к конкретному случаю. Значительно снижает ошибки, вызванные
  слепым следованием поверхностным паттернам. Особенно полезно когда задача кажется
  конкретной, но требует понимания общего принципа. +36% на сложных вопросах MMLU.

variants:
  - name: "Классический step-back"
    pattern: |
      Прежде чем ответить на вопрос, ответь на более общий вопрос:
      Общий вопрос: {abstract_question}

      Теперь используй этот ответ для решения конкретной задачи:
      Конкретная задача: {specific_task}
    cost_tokens: low
    use_when: "конкретная задача требует понимания общего принципа"

  - name: "Первопринципы"
    pattern: |
      Задача: {task}

      Шаг 1 — Первопринципы:
      Какие фундаментальные принципы/концепции лежат в основе этой задачи?
      Перечисли 2-3 ключевых принципа с кратким объяснением.

      Шаг 2 — Применение:
      Применяя эти принципы, реши исходную задачу.
    cost_tokens: low
    use_when: "задача требует понимания 'почему', а не только 'как'"

  - name: "Диагностика причин"
    pattern: |
      Проблема: {problem}

      Шаг назад: Что является классическими причинами подобных проблем в {domain}?
      Перечисли 3-5 типичных корневых причин.

      Теперь применительно к данной проблеме:
      Какие из этих причин наиболее вероятны? Почему?
      Рекомендуй диагностический подход.
    cost_tokens: medium
    use_when: "отладка, диагностика, root cause analysis"

anti_patterns:
  - "Не делай 'шаг назад' слишком абстрактным — теряется связь с задачей"
  - "Не используй для простых задач с очевидным прямым ответом"
  - "Общий вопрос должен быть реально связан с конкретной задачей"

compatibility:
  combines_well_with: [chain_of_thought, role_prompting, meta_prompting]

examples:
  good:
    - input: "Почему мой Redis кэш постоянно инвалидируется раньше времени?"
      output: >
        Ты — senior backend engineer специализирующийся на кэшировании.

        Шаг назад: Каковы общие принципы работы TTL и инвалидации кэша в Redis?
        Ответь: [описание принципов eviction policy, TTL, memory pressure, explicit invalidation]

        Применяя эти принципы к описанной проблеме:
        Какие из следующих причин наиболее вероятны в данном случае?
        1. maxmemory-policy настроена на вытеснение активных ключей
        2. TTL устанавливается слишком коротким в логике приложения
        3. Явная инвалидация срабатывает из другого места кода
        4. Memory pressure вызывает досрочное вытеснение

        Порекомендуй конкретные шаги диагностики для каждой причины.

quality_signals:
  - "явный 'шаг назад' к более абстрактному вопросу"
  - "общий ответ используется как основа для конкретного решения"
  - "логическая связь между абстракцией и конкретикой"
