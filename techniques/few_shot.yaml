id: few_shot
name: "Few-Shot Prompting"
aliases: ["примеры", "few-shot", "in-context learning", "обучение на примерах"]

when_to_use:
  task_types: [structured_output, transformation, classification, formatting, translation, extraction]
  complexity: [low, medium]
  not_for: [open_ended_reasoning, long_creative_tasks, tasks_requiring_novel_thinking]

priority: 3

why_it_works: >
  Демонстрирует модели желаемый формат через конкретные примеры input→output,
  не требуя fine-tuning. Модель подхватывает паттерн, стиль, структуру и уровень
  детализации. 3-5 примеров оптимальны: меньше — слабый сигнал, больше — перегрузка
  контекста. Наиболее эффективно когда нужен специфический формат вывода или
  нестандартная трансформация текста. Работает лучше других техник для задач
  где "правило сложно описать словами, но легко показать".

optimal_examples_count: "3-5"
example_placement: "перед основным заданием"

variants:
  - name: "One-Shot"
    pattern: |
      Пример:
      Вход: {example_input}
      Выход: {example_output}

      Задание:
      Вход: {actual_input}
      Выход:
    cost_tokens: low
    use_when: "задача простая, один пример достаточно задаёт паттерн"

  - name: "Few-Shot (3-5 примеров)"
    pattern: |
      Вот примеры задачи:

      Вход: {example_1_input}
      Выход: {example_1_output}

      Вход: {example_2_input}
      Выход: {example_2_output}

      Вход: {example_3_input}
      Выход: {example_3_output}

      Теперь выполни:
      Вход: {actual_input}
      Выход:
    cost_tokens: medium
    use_when: "нужно показать разные edge cases или вариации"

  - name: "Few-Shot с объяснением"
    pattern: |
      Примеры с пояснением логики:

      Вход: {example_input}
      Мышление: {reasoning}
      Выход: {output}

      Выполни аналогично:
      Вход: {actual_input}
    cost_tokens: medium
    use_when: "нужно не только показать формат, но и логику принятия решений"

tips:
  - "Используй разнообразные примеры — не все один тип, покажи edge cases"
  - "Примеры должны быть репрезентативными для реальных входных данных"
  - "Порядок примеров важен: последний пример имеет больший вес"
  - "Если примеры противоречат — модель будет галлюцинировать"

anti_patterns:
  - "Не используй >7 примеров — перегружает контекст, снижает качество"
  - "Не показывай примеры с ошибками — модель их скопирует"
  - "Не смешивай разные типы задач в примерах одного промпта"

compatibility:
  combines_well_with: [structured_output, role_prompting, constraints_prompting]
  less_useful_with: [chain_of_thought]

examples:
  good:
    - input: "Классифицировать тональность отзывов"
      output: >
        Классифицируй тональность отзыва как: позитивный / негативный / нейтральный.

        Отзыв: "Отличный продукт, очень доволен покупкой!"
        Тональность: позитивный

        Отзыв: "Пришло сломанное, поддержка не отвечает"
        Тональность: негативный

        Отзыв: "Товар получен, соответствует описанию"
        Тональность: нейтральный

        Теперь классифицируй:
        Отзыв: "{user_review}"
        Тональность:

quality_signals:
  - "3-5 примеров (не больше 7)"
  - "примеры разнообразны и покрывают edge cases"
  - "формат input/output одинаков во всех примерах"
  - "финальный запрос в том же формате что и примеры"
