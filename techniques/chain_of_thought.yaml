id: chain_of_thought
name: "Chain of Thought (CoT)"
aliases: ["цепочка рассуждений", "пошаговое мышление", "think step by step", "шаги мышления"]

when_to_use:
  task_types: [analysis, reasoning, debugging, planning, math, classification, decision_making]
  complexity: [medium, high]
  not_for: [simple_facts, creative_freeform, translation, short_generation]

priority: 2

why_it_works: >
  Заставляет модель "думать вслух" до выдачи финального ответа. Промежуточные шаги
  проверяются на консистентность — модель сама себя корректирует. Снижает ошибки
  на 10-30% для задач с многоэтапной логикой. Self-consistency вариант (несколько
  независимых цепочек + выбор лучшей) даёт +17.9% на математических задачах.
  Работает лучше на моделях 7B+: у слабых моделей CoT иногда ухудшает результат.

variants:
  - name: "Zero-Shot CoT"
    pattern: "Думай шаг за шагом перед финальным ответом."
    cost_tokens: low
    use_when: "задача средней сложности, нет специфики шагов"

  - name: "Explicit Steps CoT"
    pattern: |
      Выполни задачу в {N} шага:
      Шаг 1: {first_action}
      Шаг 2: {second_action}
      Шаг 3: Синтезируй результат и дай итоговый ответ.
    cost_tokens: medium
    use_when: "структура задачи заранее известна, шаги предсказуемы"

  - name: "Self-Consistency CoT"
    pattern: |
      Рассмотри задачу с {N} независимых точек зрения.
      Для каждой: запиши рассуждение и предварительный вывод.
      Затем сравни подходы и дай итоговый ответ на основе наиболее обоснованного.
    cost_tokens: high
    use_when: "критически важная задача, нужна максимальная точность"

  - name: "Reflection CoT"
    pattern: |
      Сначала дай предварительный ответ.
      Затем критически проверь его: есть ли ошибки, упущенные аспекты?
      Исправь и дай финальный ответ.
    cost_tokens: medium
    use_when: "задача, где модель склонна к ошибкам или упрощениям"

anti_patterns:
  - "Не применяй для простых фактических вопросов — лишние токены без пользы"
  - "Не применяй для свободного творческого письма — разрушает поток генерации"
  - "Не добавляй шаги которые не имеют смысла для конкретной задачи — это шум"
  - "Избегай бесконечных цепочек (>6 шагов) — модель теряет контекст"

compatibility:
  combines_well_with: [role_prompting, structured_output, self_consistency, meta_prompting]
  conflicts_with: [direct_answer_pattern]

examples:
  good:
    - input: "Найди баги в этом коде"
      output: >
        Ты — senior code reviewer.
        Проанализируй код пошагово:
        Шаг 1: Проверь логические ошибки и некорректные условия.
        Шаг 2: Найди потенциальные исключения и edge cases.
        Шаг 3: Оцени производительность и читаемость.
        Для каждой найденной проблемы: строка → тип проблемы → почему это баг → как исправить.

    - input: "Стоит ли мне использовать PostgreSQL или MongoDB?"
      output: >
        Ты — database architect.
        Проанализируй выбор базы данных пошагово:
        Шаг 1: Определи характеристики данных (структура, связи, объём).
        Шаг 2: Оцени паттерны запросов (reads vs writes, сложность joins).
        Шаг 3: Взвесь плюсы/минусы каждого варианта для описанного кейса.
        Шаг 4: Дай итоговую рекомендацию с обоснованием.

  bad:
    - input: "Какой цвет у неба?"
      note: "CoT избыточен для тривиального факта"

quality_signals:
  - "наличие пронумерованных шагов или слов 'сначала/затем/наконец'"
  - "промежуточный вывод перед финальным ответом"
  - "шаги логически вытекают один из другого"
  - "финальный ответ явно обозначен"
