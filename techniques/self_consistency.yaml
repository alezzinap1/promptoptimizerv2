id: self_consistency
name: "Self-Consistency"
aliases: ["самосогласованность", "multiple paths", "несколько подходов", "голосование"]

when_to_use:
  task_types: [analysis, decision_making, risk_assessment, complex_reasoning, math, research]
  complexity: [high]
  not_for: [simple_tasks, time_sensitive_tasks, creative_freeform, factual_lookup]

priority: 4

why_it_works: >
  **Несколько независимых путей + согласование** снижает случайные ошибки одного рассуждения;
  **компромисс** — заметно больше токенов. Имеет смысл для критичных решений и анализа,
  не для простых или срочных запросов.

variants:
  - name: "Explicit multi-path"
    pattern: |
      Рассмотри задачу тремя независимыми способами.

      Подход 1: {approach_1_framing}
      [рассуждение и вывод]

      Подход 2: {approach_2_framing}
      [рассуждение и вывод]

      Подход 3: {approach_3_framing}
      [рассуждение и вывод]

      Итог: сравни три подхода и дай финальный ответ на основе наиболее обоснованного.
    cost_tokens: high
    use_when: "нужна максимальная надёжность, цена токенов не критична"

  - name: "Devil's advocate"
    pattern: |
      Сначала обоснуй позицию ЗА: {position}.
      Затем обоснуй позицию ПРОТИВ так же убедительно.
      Наконец, дай взвешенный вывод с учётом обоих аргументов.
    cost_tokens: medium
    use_when: "нужно избежать confirmation bias, оценить риски"

  - name: "Confidence scoring"
    pattern: |
      Дай 3 варианта ответа на задачу.
      Для каждого укажи: вариант → обоснование → уверенность (1-10).
      Затем выбери и обоснуй лучший вариант.
    cost_tokens: medium
    use_when: "нужно оценить неопределённость и выбрать оптимум"

anti_patterns:
  - "Не используй для простых задач — 3x стоимость не оправдана"
  - "Не используй когда есть чёткий правильный ответ — лишнее голосование"
  - "Не больше 4-5 подходов — после этого качество не растёт, а токены расходуются"

compatibility:
  combines_well_with: [chain_of_thought, role_prompting, meta_prompting]
  is_expensive_version_of: [chain_of_thought]

examples:
  good:
    - input: "Стоит ли нашему стартапу выходить на рынок B2B или B2C?"
      output: >
        Ты — опытный бизнес-стратег.
        Проанализируй выбор модели монетизации с трёх точек зрения:

        Перспектива 1 (ресурсы и скорость): оцени что реалистичнее с текущей командой.
        Перспектива 2 (рынок и конкуренция): где меньше конкуренция и выше барьеры входа.
        Перспектива 3 (unit-экономика): где лучше LTV/CAC в горизонте 18 месяцев.

        По каждой перспективе: факты → рассуждение → предварительный вывод.
        Итог: взвешенная рекомендация с обоснованием.

quality_signals:
  - "явно заданы 2-4 независимых perspective/подхода"
  - "финальный ответ синтезирует несколько выводов"
  - "модели предложено сравнить подходы, а не просто перечислить"
