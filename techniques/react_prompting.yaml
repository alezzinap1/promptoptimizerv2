id: react_prompting
name: "ReAct (Reason + Act)"
aliases: ["react", "reason and act", "рассуждение и действие", "tool use prompting"]

when_to_use:
  task_types: [multi_step_tasks, research, planning_with_tools, agent_tasks, debugging_complex]
  complexity: [high]
  not_for: [single_step_tasks, no_tools_available, simple_generation]

priority: 5

why_it_works: >
  ReAct чередует рассуждение (Thought) и действие (Action/Observation) в явном цикле.
  Это имитирует человеческий процесс "думаю → делаю → смотрю на результат → думаю снова".
  Критически важно для агентных задач: модель не пытается решить всё одним прогоном,
  а итеративно корректирует курс на основе промежуточных результатов.
  Техника особенно мощная в связке с реальными инструментами (поиск, код, API).

variants:
  - name: "Classic ReAct"
    pattern: |
      Выполняй задачу итеративно. Для каждого шага:

      Мысль: [что ты думаешь о текущем состоянии и что нужно сделать]
      Действие: [что конкретно делаешь]
      Наблюдение: [что получилось, что узнал]

      Повторяй до достижения цели. В конце:
      Финальный ответ: [итоговый вывод]

      Задача: {task}
    cost_tokens: high
    use_when: "задача требует итеративного исследования"

  - name: "Planning ReAct"
    pattern: |
      Шаг 1 — Составь план: перечисли все шаги для решения задачи.
      Шаг 2 — Выполни каждый шаг. После каждого шага: проверь результат и скорректируй план если нужно.
      Шаг 3 — Финальный вывод.

      Задача: {task}
    cost_tokens: medium
    use_when: "задача сложная но без реальных инструментов, нужна структурированная итерация"

  - name: "Debug ReAct"
    pattern: |
      Диагностируй проблему итеративно:

      Гипотеза 1: {hypothesis}
      Проверка: {how_to_verify}
      Результат: [подтверждена / опровергнута / нужна уточнение]

      Повторяй для каждой гипотезы пока не найдёшь причину.
      Итог: корневая причина + рекомендация.
    cost_tokens: high
    use_when: "сложный баг или проблема с неизвестной причиной"

anti_patterns:
  - "Не применяй для простых задач — сильная overhead по токенам"
  - "Без реальных инструментов модель будет 'симулировать' действия — это менее полезно"
  - "Не допускай бесконечных циклов — укажи максимум итераций"

compatibility:
  combines_well_with: [chain_of_thought, role_prompting, meta_prompting]
  requires: "понимание когда цикл должен завершиться"

examples:
  good:
    - input: "Найди и исправь все проблемы в этом коде"
      output: >
        Ты — senior developer и debugger.
        Проанализируй код итеративно:

        Мысль: что я вижу в этом коде, какие потенциальные проблемы?
        Действие: проверь каждую функцию на логические ошибки
        Наблюдение: [найденные проблемы]

        Мысль: есть ли проблемы с edge cases или исключениями?
        Действие: проверь обработку ошибок и граничные условия
        Наблюдение: [результат]

        Финальный ответ: список всех проблем с исправлениями

quality_signals:
  - "явный цикл Thought/Action/Observation или аналог"
  - "каждая итерация основана на результате предыдущей"
  - "есть условие завершения цикла"
  - "финальный синтез всех наблюдений"
