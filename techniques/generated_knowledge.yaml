id: generated_knowledge
name: "Generated Knowledge Prompting"
aliases: ["генерация знаний", "knowledge generation", "pre-knowledge", "подготовка контекста"]

when_to_use:
  task_types: [analysis, research, decision_making, writing, creative]
  complexity: [medium, high]
  not_for: [simple_facts, structured_output, code, debugging]

priority: 7

why_it_works: >
  Перед финальным ответом заставляет модель явно сгенерировать релевантные факты, принципы
  и знания по теме. Затем использует их как контекст для ответа. Решает проблему "неявных
  знаний" — модель знает нужную информацию, но не активирует её при прямом ответе.
  Особенно эффективно когда вопрос требует нишевых знаний или межотраслевых связей.
  Снижает галлюцинации за счёт явной верификации знаний перед использованием.

variants:
  - name: "Сбор фактов"
    pattern: |
      Задача: {task}

      Шаг 1 — Генерация знаний:
      Перечисли 5-7 ключевых фактов/принципов, наиболее релевантных для этой задачи.
      Для каждого укажи степень уверенности: высокая/средняя/низкая.

      Шаг 2 — Ответ:
      Используя только факты с высокой и средней уверенностью, ответь на задачу.
    cost_tokens: medium
    use_when: "задача требует специфических знаний, нужно минимизировать галлюцинации"

  - name: "Исследование + применение"
    pattern: |
      Тема: {topic}

      Сначала изложи ключевые знания по теме:
      - Основные концепции и определения
      - Важные принципы и паттерны
      - Типичные проблемы и решения

      Затем применительно к задаче: {task}
      Используй изложенные знания для решения.
    cost_tokens: medium
    use_when: "тема нишевая или требует систематизации перед ответом"

  - name: "Перспективы экспертов"
    pattern: |
      Задача: {task}

      Собери экспертные знания с трёх точек зрения:

      Перспектива {expert_1}: [ключевые знания и принципы]
      Перспектива {expert_2}: [ключевые знания и принципы]
      Перспектива {expert_3}: [ключевые знания и принципы]

      Синтез: используя собранные знания, дай взвешенный ответ.
    cost_tokens: high
    use_when: "многогранная тема, нужны знания из разных доменов"

anti_patterns:
  - "Не применяй когда задача не требует специфических знаний"
  - "Не давай слишком широкий вопрос для генерации знаний — фокус на релевантном"
  - "Верификация уверенности важна — без неё метод не снижает галлюцинации"

compatibility:
  combines_well_with: [chain_of_thought, role_prompting, self_consistency]
  is_complementary_to: [step_back]

examples:
  good:
    - input: "Напиши промпт для анализа unit economics SaaS стартапа"
      output: >
        Ты — финансовый аналитик с опытом оценки SaaS компаний.

        Шаг 1 — Ключевые знания по unit economics SaaS:
        Перечисли 5-7 критически важных метрик (LTV, CAC, MRR, Churn rate, etc.)
        с определением и формулой расчёта каждой.
        Укажи нормальные и тревожные значения для каждой метрики.

        Шаг 2 — Применяя эти знания, проанализируй предоставленные данные:
        [вставь данные компании]

        Для каждой метрики: значение → оценка → рекомендация.
        Итоговый вывод о жизнеспособности unit economics.

quality_signals:
  - "явный шаг генерации знаний перед ответом"
  - "знания структурированы и верифицированы по уверенности"
  - "финальный ответ явно использует сгенерированные знания"
