# CD: SSH на VPS → git pull → docker build → перезапуск prompt-opt
# Требуются repository secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# Опционально: SSH_PORT (если не 22), SSH_KNOWN_HOSTS (вывод ssh-keyscan -H host)
#
# Каталог деплоя на сервере: repository variable DEPLOY_PATH (например /home/user1/promptoptimizerv2).
# Если переменная не задана, используется ~/promptoptimizerv2 от имени SSH-пользователя.

name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Check SSH secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing secret SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing secret SSH_USER" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "Missing secret SSH_PRIVATE_KEY" && exit 1)

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          protocol: tcp
          timeout: 60s
          command_timeout: 25m
          script_stop: true
          script: |
            set -euo pipefail
            if [ -n "${{ vars.DEPLOY_PATH }}" ]; then
              DEPLOY="${{ vars.DEPLOY_PATH }}"
            else
              DEPLOY="${HOME}/promptoptimizerv2"
            fi
            cd "$DEPLOY"
            git pull
            docker build -t prompt-engineer .
            docker rm -f prompt-opt
            docker run -d --name prompt-opt --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file .env \
              -v "$(pwd)/data:/app/data" \
              prompt-engineer
